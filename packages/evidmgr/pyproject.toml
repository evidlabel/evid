[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "evidmgr"
version = "0.1.0"
description = "Unified evidence management application: evid + did + vecdb"
requires-python = ">=3.11"
dependencies = [
    "evid",
    "did",
    "vecdb",
    "pydantic>=2",
    "pyyaml",
    "ruamel.yaml>=0.17",
    "python-slugify",
    "PySide6",
    "arrow",
    "rich",
    "gender-guesser",
    "faker",
    "requests",
    "beautifulsoup4",
]

[project.scripts]
evidmgr = "evidmgr.gui.main_window:main"

[tool.uv.sources]
evid  = { workspace = true }
did   = { workspace = true }
vecdb = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/evidmgr"]

[tool.pytest.ini_options]
addopts = "--tb=native"
python_files = "test_*.py"
python_functions = "test_*"
markers = [
    "slow: marks tests as slow",
    "integration: marks integration tests",
]
