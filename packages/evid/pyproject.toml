[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "evid"
version = "0.3.1"
description = "Evidence management: PDF labeling, anonymization, vector search, and prompts."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
    "pyyaml",
    "ruamel.yaml>=0.17",
    "python-slugify",
    "PySide6",
    "arrow",
    "rich",
    "gender-guesser",
    "faker",
    "requests",
    "beautifulsoup4",
    # from evid
    "pypdf",
    "PyMuPDF",
    "treeparse>=0.2.8",
    "bibtexparser",
    "demoji",
    "pandas",
    "GitPython",
    "frontend",
    # from did
    "flashtext~=2.7",
    "spacy>=3.8.2,<4",
    "rapidfuzz>=3.10.0,<4",
    "presidio-analyzer>=2.2.0",
    "presidio-anonymizer>=2.2.0",
    "numpy",
    # from vecdb
    "chromadb",
    "sentence-transformers",
]

[project.scripts]
evid = "evid.cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/evid"]

[tool.pytest.ini_options]
addopts = "--tb=native"
python_files = "test_*.py"
python_functions = "test_*"
markers = [
    "slow: marks tests as slow",
    "integration: marks integration tests",
]
