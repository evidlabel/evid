[project]
name = "did"
version = "0.1.4"
description = "A CLI and GUI tool to de-identify documents using spaCy-based entity detection and automatic YAML configuration"
authors = [{ name = "evid 210122431+evidlabel@users.noreply.github.com" }]
requires-python = ">=3.12,<4"
readme = "README.md"
dependencies = [
    "ruamel.yaml>=0.17",
    "flashtext~=2.7",
    "spacy>=3.8.2,<4",
    "en-core-web-md",
    "en-core-web-lg",
    "da_core_news_sm",  # Added for Danish language support
    "da_core_news_lg",  # Added for Danish language support
    "rapidfuzz>=3.10.0,<4",
    "presidio-analyzer>=2.2.0",
    "presidio-anonymizer>=2.2.0",
    "bibtexparser",
    "rich>=13.3.0,<14",
    "pydantic>=2.11,<3",  # Added for YAML handling with data validation
    "numpy>=2.3",  # Added for vectorization
    "treeparse",
    "PyMuPDF>=1.23.0",  # Added for PDF text extraction
    "faker",
    "PySide6"
]

[project.scripts]
did = "did.cli:main"
gdid = "gdid.main:main"

[dependency-groups]
dev = ["pytest>=8.4.0,<9", "mkdocs", "pytest-cov", "pytest-rich", "pytest-qt", "pytest-cov>=5.0", "pre-commit", "ruff>=0.6.0"]

[tool.uv]

[tool.uv.sources]
en-core-web-md = { url = "https://github.com/explosion/spacy-models/releases/download/en_core_web_md-3.8.0/en_core_web_md-3.8.0-py3-none-any.whl" }
en-core-web-lg = { url = "https://github.com/explosion/spacy-models/releases/download/en_core_web_lg-3.8.0/en_core_web_lg-3.8.0-py3-none-any.whl" }
da_core_news_sm = { url = "https://github.com/explosion/spacy-models/releases/download/da_core_news_sm-3.8.0/da_core_news_sm-3.8.0-py3-none-any.whl" }  # Added for Danish support
da_core_news_md = { url = "https://github.com/explosion/spacy-models/releases/download/da_core_news_md-3.8.0/da_core_news_md-3.8.0-py3-none-any.whl" }
da_core_news_lg = { url = "https://github.com/explosion/spacy-models/releases/download/da_core_news_lg-3.8.0/da_core_news_lg-3.8.0-py3-none-any.whl" }  # Added for Danish support

[tool.hatch.build.targets.sdist]
include = ["src/did", "src/gdid"]

[tool.hatch.build.targets.wheel]
include = ["src/did", "src/gdid"]

[tool.hatch.build.targets.wheel.sources]
"src/did" = "did"
"src/gdid" = "gdid"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
addopts = "--cov=src/did --cov=src/gdid --cov-report=term-missing -p no:warnings"

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "C90", "I", "N", "UP", "YTT", "S", "BLE", "FBT", "B", "A", "COM", "C4", "DTZ", "T10", "DJ", "EM", "EXE", "FA", "ISC", "ICN", "G", "INP", "PIE", "T20", "PYI", "PT", "Q", "RSE", "RET", "SLF", "SLOT", "SIM", "TID", "TCH", "INT", "ARG", "PTH", "ERA", "PD", "PGH", "PL", "TRY", "FLY", "NPY", "AIR", "PERF", "FURB", "LOG", "RUF"]
# Permissive — `did` is a squash-imported package; conformance to this strict
# rule set will be addressed in a follow-up sweep, not in this consolidation.
ignore = [
  "S101", "COM812", "ISC001", "E501",
  "T201", "T203", "BLE001", "G004", "TRY002", "TRY003", "TRY004",
  "TRY300", "TRY301", "TRY400", "TRY401",
  "RUF043",
  "EM101", "EM102", "PLR0911", "PLR0912", "PLR0913", "PLR0915",
  "PLR1714", "PLR1722", "PLR2004", "C901", "PLC0415",
  "FBT001", "FBT002", "FBT003",
  "RUF001", "RUF012", "RUF013", "RUF015", "RUF034",
  "PTH100", "PTH103", "PTH109", "PTH111", "PTH118", "PTH120",
  "PTH123", "PTH207",
  "ARG001", "ARG002", "ARG004", "ARG005",
  "SLF001", "DTZ003", "DTZ005", "DTZ011",
  "ERA001", "PERF401", "PERF402", "PERF403",
  "RET504", "RET505",
  "S110", "S112", "S306", "S311", "S506", "S603", "S607",
  "B023", "B904", "B905", "TID252", "TC001", "TC003", "TC004",
  "PIE810", "C401", "F401", "F841", "F821", "I001",
  "N802", "N806", "PD002", "PD003",
  "PT011", "EXE001",
  "SIM102", "SIM108", "SIM113", "SIM115", "SIM117", "SIM118",
  "E402", "INP001", "A002",
  "PLW0603", "PLW1510", "PLC0206", "PGH003", "PGH004",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]
