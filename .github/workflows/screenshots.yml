name: Refresh screenshots

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install evid + shellplot
        run: |
          uv venv .venv --seed
          uv pip install -e .
          uv pip install shellplot

      - name: Regenerate help.svg
        run: |
          source .venv/bin/activate
          shellplot svg single "uv run evid -h 2>/dev/null" \
            -o docs/assets/help.svg --width 120 --font-size 13

      - name: Commit updated screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: refresh help.svg [skip ci]"
          file_pattern: "docs/assets/help.svg"
